<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LedLab CORE">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <title>LedLab CORE | Landing</title>
  <style>
    :root {
      --bg: #eef2f6;
      --surface: #ffffff;
      --ink: #18212b;
      --muted: #607285;
      --brand: #0d9488;
      --brand-strong: #0f766e;
      --line: #d7dee7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f4f7fb 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .landing {
      width: min(720px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brand-strong);
      background: #d9f3ef;
      border: 1px solid rgba(15, 118, 110, 0.2);
      border-radius: 999px;
      padding: 6px 10px;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      transition: transform 0.18s ease, background-color 0.18s ease;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--brand-strong);
      transform: translateY(-1px);
    }

    .btn-secondary {
      border-color: var(--line);
      color: var(--ink);
      background: #f7f9fc;
    }

    .btn-secondary:hover {
      background: #eef3f8;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>
  <main class="landing">
    <span class="badge">LedLab CORE</span>
    <h1>Calculadora modular para paineis de LED</h1>
    <p>
      Entrada padrao do projeto. Use o botao abaixo para abrir a aplicacao completa.
      Esta pagina facilita futuras campanhas, comunicados e onboarding sem alterar o core.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="/kva-led-modular/main.html">Entrar na aplicacao</a>
      <a class="btn btn-secondary" href="../docs/checklist-validacao-iphone-pwa.md">Checklist iPhone PWA</a>
    </div>
  </main>
</body>

</html>
